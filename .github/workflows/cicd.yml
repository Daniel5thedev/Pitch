name: Pitch Platform CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: pitch-platform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate application and database
    runs-on: ubuntu-latest
    environment: Development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
          npm ci

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Typecheck frontend
        run: npm run typecheck --if-present

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migrations with Docker harness
        run: |
          supabase db start
          supabase migration up --local
          supabase db reset --local --no-seed

  deploy_staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: Staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        run: supabase link --project-ref "${{ secrets.SUPABASE_STAGING_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push staging database migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy staging Edge Functions
        run: |
          supabase functions deploy mpesa-stk-push --project-ref "${{ secrets.SUPABASE_STAGING_PROJECT_REF }}"
          supabase functions deploy mpesa-webhook --project-ref "${{ secrets.SUPABASE_STAGING_PROJECT_REF }}" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy_production:
    name: Deploy production release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    environment: Production
    steps:
      - name: Checkout immutable release
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push production database migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy production Edge Functions
        run: |
          supabase functions deploy mpesa-stk-push --project-ref "${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}"
          supabase functions deploy mpesa-webhook --project-ref "${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
